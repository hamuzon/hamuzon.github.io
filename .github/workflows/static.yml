# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync and Commit Sitemap
        run: |
          SRC="public/hamuzon.github.io-sitemap.xml"
          DST="sitemap.xml"
          if [ -f "$SRC" ]; then
            cp "$SRC" "$DST"
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            git add "$DST"
            if ! git diff --staged --quiet; then
              DATE=$(TZ=Asia/Tokyo date +"%Y-%m-%d %H:%M:%S")
              git commit -m "Update sitemap.xml (auto-sync) $DATE"
              git push
            fi
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Inject FQDN normalization script
        run: |
          # 全てのHTMLファイルの<head>直後に正規化スクリプトを挿入
          find . -maxdepth 1 -name "*.html" -not -name "google*.html" -exec sed -i '/<head>/a \  <script>if(window.location.hostname.endsWith(".")){window.location.replace(window.location.href.replace(window.location.hostname,window.location.hostname.slice(0,-1)));}</script>' {} +
      - name: Remove sensitive files from deployment artifact
        run: |
          # デプロイ対象からのみ削除
          rm -rf functions README.md README readme.md license LICENSE LICENSE.txt _redirects.md _redirects
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
