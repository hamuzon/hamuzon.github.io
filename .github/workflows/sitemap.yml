name: Update Sitemap

on:
  push:
    branches:
      - main
    paths:
      - 'public/hamuzon.github.io-sitemap.xml'
      - 'public/hamusata.f5.si-sitemap.xml'
      - 'sitemap.xml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-sitemap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          clean: true
          fetch-depth: 1

      - name: Copy sitemap.xml if exists
        run: |
          SRC="public/hamuzon.github.io-sitemap.xml"
          DST="sitemap.xml"
          if [ -f "$SRC" ]; then
            echo "Copying $SRC to $DST"
            cp "$SRC" "$DST"
          else
            echo "Error: $SRC not found"
            exit 1
          fi

      - name: Configure Git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Commit changes
        run: |
          DATE=$(TZ=Asia/Tokyo date +"%Y-%m-%d %H:%M:%S.%N")
          DATE_MS="${DATE:0:23}"
          
          git add sitemap.xml
          git commit -m "Update sitemap.xml ($DATE_MS)" || echo "No changes to commit"

      - name: Push changes
        run: git push
