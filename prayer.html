<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>東日本大震災 追悼</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@200;300&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-normal: #1a1a1a;
            --bg-prayer: #000000;
            --text-main: #f5f5f5;
            --text-sub: #7f8c8d;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-normal);
            color: var(--text-main);
            font-family: 'Noto Serif JP', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: background-color 10s ease-in-out;
        }

        body.prayer-active {
            background-color: var(--bg-prayer);
        }

        .container {
            width: 90%;
            max-width: 800px;
            text-align: center;
            position: relative;
        }

        #timer-ui {
            transition: opacity 3s ease-in-out, filter 3s ease-in-out;
        }

        .title-label {
            font-size: clamp(1rem, 4vw, 1.4rem);
            letter-spacing: 0.5em;
            color: var(--text-sub);
            margin-bottom: 2.5rem;
        }

        #countdown-text {
            font-size: clamp(3rem, 16vw, 8rem);
            font-weight: 200;
            font-variant-numeric: tabular-nums;
            margin: 0;
        }

        #prayer-ui {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            opacity: 0;
            visibility: hidden;
            transition: opacity 6s ease-in-out;
        }

        .prayer-symbol {
            font-size: clamp(3rem, 15vw, 6.5rem);
            letter-spacing: 1.5em;
            text-indent: 1.5em;
            font-weight: 300;
        }

        .ui-hide {
            opacity: 0 !important;
            filter: blur(8px);
            pointer-events: none;
        }

        .ui-show {
            opacity: 1 !important;
            visibility: visible !important;
        }

        .info-footer {
            margin-top: 4rem;
            font-size: 0.85rem;
            letter-spacing: 0.2em;
            color: #666;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="timer-ui">
            <div class="title-label" id="main-title">東日本大震災 追悼</div>
            <div id="countdown-text">00:00:00</div>
            <div class="info-footer" id="sub-footer">---</div>
        </div>
        
        <div id="prayer-ui">
            <div class="prayer-symbol">黙祷</div>
        </div>
    </div>

    <script>
        let INPUT_TIME = 1773207978.12; 
        let FOOTER_TIME = 1299822378.12;
        
        const TARGET_TIME = INPUT_TIME < 10000000000 ? INPUT_TIME * 1000 : INPUT_TIME;
        const PRAYER_TARGET = FOOTER_TIME < 10000000000 ? FOOTER_TIME * 1000 : FOOTER_TIME;
        const PRAYER_DURATION = 60000;

        function update() {
            const now = Date.now();
            const diff = TARGET_TIME - now;

            const body = document.body;
            const timerUI = document.getElementById('timer-ui');
            const prayerUI = document.getElementById('prayer-ui');
            const countdownDisplay = document.getElementById('countdown-text');
            const mainTitle = document.getElementById('main-title');
            const subFooter = document.getElementById('sub-footer');

            const dateObj = new Date(PRAYER_TARGET);
            const dateStr = `${dateObj.getFullYear()}.${String(dateObj.getMonth() + 1).padStart(2, '0')}.${String(dateObj.getDate()).padStart(2, '0')} ${String(dateObj.getHours()).padStart(2, '0')}:${String(dateObj.getMinutes()).padStart(2, '0')}:${String(dateObj.getSeconds()).padStart(2, '0')}`;

            if (diff <= 10000 && diff > -PRAYER_DURATION) {
                body.classList.add('prayer-active');
            } else {
                body.classList.remove('prayer-active');
            }

            if (diff > 0) {
                const totalSeconds = Math.floor(diff / 1000);
                const h = Math.floor(totalSeconds / 3600);
                const m = Math.floor((totalSeconds % 3600) / 60);
                const s = totalSeconds % 60;

                countdownDisplay.innerText = 
                    `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
                
                subFooter.innerText = dateStr;
                timerUI.classList.remove('ui-hide');
                prayerUI.classList.remove('ui-show');

            } else if (diff <= 0 && diff > -PRAYER_DURATION) {
                timerUI.classList.add('ui-hide');
                prayerUI.classList.add('ui-show');

            } else {
                timerUI.classList.remove('ui-hide');
                prayerUI.classList.remove('ui-show');
                
                mainTitle.innerText = "追悼";
                countdownDisplay.innerText = "14:46:18";
                subFooter.innerText = `${dateStr} | あの日を忘れない`;
            }
        }

        setInterval(update, 100);
        update();
    </script>

</body>
</html>
